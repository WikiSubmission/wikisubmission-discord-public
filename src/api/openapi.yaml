openapi: '3.0.3'
info:
  title: WikiSubmission Quran Backend
  description: >
    A dual-purpose API serving as a high-performance multilingual Quran reader
    and a staging ground for the translation editorial workflow.

    ## Key Conventions

    ### Minified JSON Keys
    All response objects use short field names to minimise bandwidth. The mapping is:

    | Short key | Full name        |
    |-----------|-----------------|
    | `cn`      | chapter_number  |
    | `vi`      | verse_index     |
    | `vk`      | verse_key       |
    | `tr`      | translations    |
    | `w`       | words           |
    | `wi`      | word_index      |
    | `gi`      | global_index    |
    | `tx`      | text / content  |
    | `li`      | lang_id         |
    | `lc`      | lang_code       |
    | `d`       | direction       |
    | `s`       | subtitle        |
    | `f`       | footer          |
    | `r`       | root            |
    | `m`       | meaning         |
    | `hl`      | highlight       |
    | `sc`      | score           |
    | `tm`      | title_match     |
    | `bn`      | book_number     |
    | `bk`      | book_name / key |
    | `t`       | testament       |
    | `cc`      | chapter_count   |
    | `vc`      | verse_count     |

    ### Reader vs Search
    - `/quran` — reader mode. Returns a contiguous range of verses identified by
      chapter/verse numbers or the compact `verses` shorthand. All reader fields in
      `QuranResponseInfo` (`chapter_start`, `chapter_end`, `verse_start`, `verse_end`)
      are populated; search fields (`q`, `total`, `scope`) are absent.
    - `/search` — full-text search mode. Returns results ranked by relevance across
      all indexed languages. Search fields in `QuranResponseInfo` are populated; reader
      range fields are absent.

    ### Bible API
    The Bible API mirrors the Quran API structure but scoped to the 66 canonical books.
    Book numbers are 1-based (1 = Genesis … 66 = Revelation). Verse keys use a
    three-part format `book:chapter:verse` (e.g. `40:5:3` = Matthew 5:3).

    ### Authentication
    All endpoints are public — no authentication required.

    ### Versioning
    The API is versioned via the URL path (`/api/v1/…`). Breaking changes will
    increment the version number.
  version: '1.0'
  contact:
    email: contact@wikisubmission.org

servers:
  - url: http://localhost:8082/api/v1
    description: Development server
  - url: https://ws-backend.wikisubmission.org/api/v1
    description: Production Server
  - url: http://ws-backend.railway.internal/api/v1
    description: Internal Production Server
  - url: https://ws-backend-vc.wikisubmission.org/api/v1
    description: railway, temp test

tags:
  - name: Reader
    description: >
      Public read-only endpoints for the Quran — verses, chapters, languages,
      appendices, and full-text / semantic search.
  - name: Bible
    description: >
      Public read-only endpoints for the Bible — book metadata, verse ranges
      (reader mode), and full-text search.
  - name: Music
    description: >
      Public read-only endpoints for music — artists, categories, albums, and
      tracks. All lists are unfiltered by default; use query parameters to narrow
      results.

paths:
  /languages:
    get:
      tags: [Reader]
      operationId: getLanguages
      summary: List supported languages
      description: >
        Returns all languages supported by the API, including the internal
        integer `id`, the ISO 639-1 `code` (used as a key in translation maps),
        the human-readable `name`, and the text `direction` (`ltr` or `rtl`).
        Use the `code` values from this endpoint as valid values for any `langs`
        or `word_langs` parameter throughout the API.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Language'
        "500":
          $ref: "#/components/responses/InternalServerErrror"

  /chapters:
    get:
      tags: [Reader]
      operationId: getChapters
      summary: Fetch chapter metadata
      description: >
        Returns metadata for all 114 Quranic chapters: chapter number, verse
        count, revelation order, and the chapter title in the requested language.
        If `lang` is omitted the title is returned in the default language (English).
        Use this endpoint to build a chapter-picker UI or map chapter numbers to
        human-readable titles.
      parameters:
        - name: lang
          in: query
          required: false
          description: >
            ISO 639-1 language code for the chapter title (e.g. `en`, `ar`, `fr`).
            Must be a code returned by `/languages`. Defaults to `en` when omitted.
          schema:
            type: string
          example: en
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterMetadata'
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  /appendices:
    get:
      tags: [Reader]
      operationId: getAppendices
      summary: Fetch appendix metadata
      description: >
        Returns metadata for all Quranic appendices: a numeric code, a title, and
        a short snippet. If `lang` is omitted the title and snippet are returned in
        the default language (English).
      parameters:
        - name: lang
          in: query
          required: false
          description: >
            ISO 639-1 language code for the appendix title and snippet
            (e.g. `en`, `ar`). Must be a code returned by `/languages`.
          schema:
            type: string
          example: en
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppendixMetadata'
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  /quran:
    get:
      tags: [Reader]
      operationId: getQuran
      summary: Fetch a range of verses
      description: >
        Returns a contiguous range of Quranic verses in one or more languages
        simultaneously. Two selection modes are supported:

        **Range mode** — use `chapter_number_start`, `verse_start`, `verse_end`,
        and optionally `chapter_number_end` to specify a span.

        **Compact mode** — use the `verses` parameter with a shorthand reference
        string. When `verses` is present it takes priority over all range params.

        Optional word-level data (Arabic text, root, meaning) can be added with
        `include_words`, `include_root`, and `include_meaning`.
      parameters:
        - name: chapter_number_start
          in: query
          required: false
          description: >
            First (or only) chapter to include, 1-based (1–114). When
            `chapter_number_end` is omitted, only this chapter is queried.
            Ignored when `verses` is provided.
          schema:
            type: integer
            minimum: 1
            maximum: 114
          example: 2
        - name: chapter_number_end
          in: query
          description: >
            Last chapter to include (inclusive), 1-based (1–114). Must be ≥
            `chapter_number_start`. Ignored when `verses` is provided.
          schema:
            type: integer
            minimum: 1
            maximum: 114
          example: 2
        - name: verse_start
          in: query
          description: >
            First verse to include within `chapter_number_start`, 1-based.
            Defaults to 1 when omitted. Ignored when `verses` is provided.
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: verse_end
          in: query
          description: >
            Last verse to include within `chapter_number_end` (or
            `chapter_number_start` if no end chapter), 1-based. Defaults to the
            last verse of the chapter when omitted. Ignored when `verses` is
            provided.
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: verses
          in: query
          required: false
          description: >
            Compact verse reference string. Takes priority over all
            chapter/verse range params when present. Supported formats:

            - Single verse: `1:1`
            - Range within a chapter: `1:1-7`
            - Comma-separated list: `1:2,2:255,2:285-286`

            Maximum 300 verses per request.
          schema:
            type: string
          example: "2:255,2:285-286"
        - name: langs
          in: query
          required: true
          explode: true
          description: >
            One or more ISO 639-1 language codes to include in the response.
            Each code must be a value returned by `/languages`.
            Translations for each code appear inside every verse's `tr` map.
          schema:
            type: array
            items:
              type: string
          example: ["en", "ar"]
        - $ref: '#/components/parameters/WordLangsParam'
        - $ref: '#/components/parameters/IncludeWordsParam'
        - $ref: '#/components/parameters/IncludeRootParam'
        - $ref: '#/components/parameters/IncludeMeaningParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuranResponse'
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  /search:
    get:
      tags: [Reader]
      operationId: search
      summary: Full-text search across the Quran
      description: >
        Full-text search across verse translations and chapter titles in all
        indexed languages. Supports fuzzy / partial matching via `pg_trgm`.

        **Scope `verses` (default)** — searches the translated text of each
        verse. Returns verses ranked by FTS relevance, optionally boosted by
        vector similarity when `semantic=true`.

        **Scope `words`** — searches word-level Arabic / transliteration text.
        When `root` is also provided with `scope=words`, an exact root match is
        performed instead of FTS.

        Results are paginated with `limit` / `offset`. Use the `total` field in
        the response envelope to calculate page count.
      parameters:
        - name: q
          in: query
          required: false
          description: >
            Search query (2–200 characters). Supports quoted phrases and
            exclusions (e.g. `"mercy of God" -punishment`). Required unless
            `root` is provided with `scope=words`.
          schema:
            type: string
            minLength: 2
            maxLength: 200
          example: "mercy of God"
        - name: root
          in: query
          required: false
          description: >
            Arabic root string (3–4 letters, e.g. `رحم`). When provided with
            `scope=words`, performs an exact match on `word_root` instead of
            running FTS. Takes priority over `q`.
          schema:
            type: string
          example: "رحم"
        - name: langs
          in: query
          explode: true
          description: >
            ISO 639-1 language codes to search in. When omitted, all indexed
            languages are searched simultaneously. Only affects which translation
            columns are queried — returned verse objects always include the
            translations for these codes.
          schema:
            type: array
            items:
              type: string
          example: ["en"]
        - name: scope
          in: query
          description: >
            Whether to search verse translations (`verses`) or word-level Arabic /
            transliteration text (`words`). Defaults to `verses`.
          schema:
            type: string
            enum: [verses, words]
            default: verses
          example: verses
        - name: limit
          in: query
          description: Maximum number of verses to return per page (1–100). Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          description: >
            Number of results to skip before returning the page. Use with
            `limit` and the `total` field for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
        - name: semantic
          in: query
          required: false
          description: >
            Enable hybrid semantic search (FTS + vector RRF fusion) when the
            server has an embedding model configured. Defaults to `true` when
            `OPENAI_API_KEY` is set, otherwise `false`. Set to `false` to force
            pure keyword FTS regardless of server configuration.
          schema:
            type: boolean
          example: true
        - $ref: '#/components/parameters/WordLangsParam'
        - $ref: '#/components/parameters/IncludeWordsParam'
        - $ref: '#/components/parameters/IncludeRootParam'
        - $ref: '#/components/parameters/IncludeMeaningParam'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuranResponse'
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalServerErrror"
        '501':
          $ref: '#/components/responses/NotImplementedError'

  # --- BIBLE API ---

  /bible/books:
    get:
      tags: [Bible]
      operationId: getBibleBooks
      summary: List all Bible books
      description: >
        Returns summary metadata for all 66 canonical Bible books: book number,
        book name, testament (`OT` or `NT`), chapter count, and total verse count.
        Use `bn` (book_number) from this list as the `book` parameter in `/bible`.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BibleBook'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /bible:
    get:
      tags: [Bible]
      operationId: getBible
      summary: Fetch Bible verses by range
      description: >
        Returns verses for a specific Bible book and chapter/verse range in one
        or more languages simultaneously. The response groups verses by book and
        chapter, mirroring the `/quran` response structure.

        To fetch an entire chapter, supply only `book` and `chapter_start` — the
        server defaults `verse_start` to 1 and `verse_end` to the last verse.

        To fetch a single verse, supply `book`, `chapter_start`, `verse_start`,
        and set `verse_end` equal to `verse_start`.
      parameters:
        - name: book
          in: query
          required: true
          description: >
            1-based Bible book number. 1 = Genesis, 40 = Matthew, 66 = Revelation.
            Use `/bible/books` to retrieve the full list of book numbers and names.
          schema:
            type: integer
            minimum: 1
            maximum: 66
          example: 40
        - name: chapter_start
          in: query
          required: true
          description: >
            First chapter to include, 1-based and within the bounds of the
            requested book. Use `/bible/books` to find each book's `cc`
            (chapter_count).
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: chapter_end
          in: query
          required: false
          description: >
            Last chapter to include (inclusive), 1-based. Must be ≥
            `chapter_start`. Defaults to `chapter_start` when omitted (single
            chapter).
          schema:
            type: integer
            minimum: 1
          example: 5
        - name: verse_start
          in: query
          required: false
          description: >
            First verse to include within `chapter_start`, 1-based. Defaults
            to 1 (beginning of the chapter) when omitted.
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: verse_end
          in: query
          required: false
          description: >
            Last verse to include within `chapter_end` (or `chapter_start`),
            1-based. Defaults to the last verse of the chapter when omitted.
          schema:
            type: integer
            minimum: 1
          example: 12
        - name: langs
          in: query
          required: true
          explode: true
          description: >
            One or more ISO 639-1 language codes to include. Each code must be
            returned by `/languages`. Currently the primary supported code is
            `en` (English).
          schema:
            type: array
            items:
              type: string
          example: ["en"]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BibleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /bible/search:
    get:
      tags: [Bible]
      operationId: searchBible
      summary: Full-text search across the Bible
      description: >
        Full-text search over Bible verse content and footnotes. Results are
        grouped by book and chapter, ordered by relevance score descending.
        Paginate with `limit` and `offset`; use the `total` field in the response
        envelope to compute total pages.
      parameters:
        - name: q
          in: query
          required: true
          description: >
            Search query (2–200 characters). Matched against verse text and
            footnotes using PostgreSQL full-text search. Supports quoted phrases.
          schema:
            type: string
            minLength: 2
            maxLength: 200
          example: "blessed are the meek"
        - name: langs
          in: query
          required: false
          explode: true
          description: >
            ISO 639-1 language codes to search in. When omitted, all indexed
            languages are searched. Currently the primary supported code is `en`.
          schema:
            type: array
            items:
              type: string
          example: ["en"]
        - name: limit
          in: query
          required: false
          description: Maximum number of verses to return per page (1–100). Defaults to 20.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          example: 20
        - name: offset
          in: query
          required: false
          description: >
            Number of results to skip before returning the page. Use with
            `limit` and `total` for pagination.
          schema:
            type: integer
            minimum: 0
            default: 0
          example: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BibleResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  # --- MUSIC API ---

  /music/artists:
    get:
      tags: [Music]
      operationId: getMusicArtists
      summary: List all music artists
      description: >
        Returns all artists in the music catalogue, ordered by `display_priority`
        ascending (lower number = shown first). Use `id` to filter albums and
        tracks by artist.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicArtist'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /music/categories:
    get:
      tags: [Music]
      operationId: getMusicCategories
      summary: List all music categories
      description: >
        Returns all music categories (genres / themes), ordered by
        `display_priority` ascending. Use `id` to filter tracks by category.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicCategory'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /music/albums:
    get:
      tags: [Music]
      operationId: getMusicAlbums
      summary: List music albums
      description: >
        Returns all albums, optionally filtered by artist. Albums are returned
        in no guaranteed order; sort client-side by `release_date` or `name` as
        needed.
      parameters:
        - name: artist_id
          in: query
          description: >
            Filter results to albums belonging to this artist. Must be an `id`
            returned by `/music/artists`. Omit to return all albums.
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicAlbum'
        '500':
          $ref: '#/components/responses/InternalServerErrror'

  /music/tracks:
    get:
      tags: [Music]
      operationId: getMusicTracks
      summary: List music tracks
      description: >
        Returns tracks, with optional filters for artist, category, album, and
        featured status. Multiple filters can be combined — they are applied as
        AND conditions. Omit all filters to retrieve the full catalogue.
      parameters:
        - name: artist_id
          in: query
          description: >
            Return only tracks by this artist. Must be an `id` returned by
            `/music/artists`.
          schema:
            type: integer
          example: 1
        - name: category_id
          in: query
          description: >
            Return only tracks in this category. Must be an `id` returned by
            `/music/categories`.
          schema:
            type: integer
          example: 2
        - name: album_id
          in: query
          description: >
            Return only tracks from this album. Must be an `id` returned by
            `/music/albums`.
          schema:
            type: integer
          example: 3
        - name: featured
          in: query
          description: >
            When `true`, return only featured (hand-picked) tracks. When omitted
            or `false`, featured and non-featured tracks are both included.
          schema:
            type: boolean
          example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MusicTrack'
        '500':
          $ref: '#/components/responses/InternalServerErrror'


components:
  # -----------------------------------------------------------------------
  # Reusable parameters shared across Reader endpoints
  # -----------------------------------------------------------------------
  parameters:
    WordLangsParam:
      name: word_langs
      in: query
      explode: true
      description: >
        Language codes for word-level text. Must be a subset of the `langs`
        array. Only words in these languages are included in the `tx` map of
        each `WordData` object. Typically set to `["ar"]` to include Arabic
        word text alongside an English translation.
      schema:
        type: array
        items:
          type: string
      example: ["ar"]
    IncludeWordsParam:
      name: include_words
      in: query
      description: >
        When `true`, each verse includes a `w` array of `WordData` objects
        with per-word text (and optionally root / meaning). When `false`
        (default), the `w` array is entirely omitted from each verse, keeping
        the response compact.
      schema:
        type: boolean
        default: false
      example: false
    IncludeRootParam:
      name: include_root
      in: query
      description: >
        When `true`, each `WordData` object includes the `r` field containing
        the Arabic root (3–4 letters). Requires `include_words=true`. Has no
        effect when `include_words=false`.
      schema:
        type: boolean
        default: false
      example: false
    IncludeMeaningParam:
      name: include_meaning
      in: query
      description: >
        When `true`, each `WordData` object includes the `m` field containing
        an English gloss / meaning for the word. Requires `include_words=true`.
        Has no effect when `include_words=false`.
      schema:
        type: boolean
        default: false
      example: false

  schemas:
    # -----------------------------------------------------------------------
    # Core response — shared by /quran and /search
    # -----------------------------------------------------------------------
    QuranResponse:
      type: object
      description: >
        Top-level envelope for both `/quran` (reader) and `/search` (FTS)
        responses. The `info` object describes the query parameters that were
        resolved; `chapters` contains the matching verses grouped by chapter.
      properties:
        info:
          $ref: '#/components/schemas/QuranResponseInfo'
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/ChapterData'

    QuranResponseInfo:
      type: object
      description: >
        Metadata envelope describing the resolved query. Reader fields
        (`chapter_start`, `chapter_end`, `verse_start`, `verse_end`) are
        populated by `/quran` and absent from `/search` responses. Search fields
        (`q`, `total`, `limit`, `offset`, `scope`) are populated by `/search`
        and absent from `/quran` responses.
      properties:
        result_count:
          type: integer
          description: >
            Number of verses returned in this response page. For `/quran` this
            equals the total number of matching verses (no pagination); for
            `/search` this is the number of verses on the current page (≤
            `limit`).
          example: 7
        # Reader fields
        chapter_start:
          type: integer
          description: >
            Resolved first chapter of the query range (reader only). Reflects
            the `chapter_number_start` param after server validation.
          example: 2
        chapter_end:
          type: integer
          description: >
            Resolved last chapter of the query range (reader only). Equal to
            `chapter_start` when no end chapter was requested.
          example: 2
        verse_start:
          type: integer
          description: >
            Resolved first verse of the query range (reader only). Defaults to
            1 when the param was omitted.
          example: 1
        verse_end:
          type: integer
          description: >
            Resolved last verse of the query range (reader only). Defaults to
            the final verse of the chapter when the param was omitted.
          example: 7
        # Search fields
        q:
          type: string
          description: >
            The search query as submitted by the client (search only).
          example: "mercy of God"
        total:
          type: integer
          description: >
            Total number of matching verses across ALL pages (search only). Use
            together with `limit` and `offset` to calculate the total page count
            and navigate paginated results.
          example: 42
        limit:
          type: integer
          description: Page size used for this response (search only).
          example: 20
        offset:
          type: integer
          description: Number of results skipped before this page (search only).
          example: 0
        scope:
          type: string
          description: >
            Search scope that was applied (search only). `verses` means verse
            translation text was searched; `words` means word-level Arabic /
            transliteration text was searched.
          example: verses

    ChapterData:
      type: object
      description: >
        A single Quranic chapter with its matching verses. In reader mode all
        verses within the requested range are included. In search mode only
        verses that matched the query are included, and the `hits` and `tm`
        fields are populated.
      properties:
        cn:
          type: integer
          description: chapter_number — Quranic chapter number, 1-based (1–114).
          example: 1
        titles:
          type: object
          description: >
            Map of chapter titles keyed by ISO 639-1 language code. Only codes
            that were requested in `langs` (or all available codes for
            `/chapters`) are present.
          additionalProperties:
            type: string
          example:
            en: "The Opening"
            ar: "الفاتحة"
        verses:
          type: array
          items:
            $ref: '#/components/schemas/VerseData'
        hits:
          type: integer
          description: >
            Number of verses in this chapter that matched the search query
            (search only). Absent from `/quran` responses.
          example: 3
        tm:
          type: boolean
          description: >
            title_match — `true` when the chapter title itself matched the
            search query, not just verse content (search only). Absent from
            `/quran` responses.
          example: false

    VerseData:
      type: object
      description: >
        A single Quranic verse with its translations in the requested languages,
        and optionally word-by-word data.
      properties:
        vi:
          type: integer
          description: >
            verse_index — 0-based position of this verse within its chapter.
            The first verse (`vi: 0`) is verse 1.
          example: 0
        vk:
          type: string
          description: >
            verse_key — `chapter_number:verse_number` (1-based), e.g. `2:255`
            for Ayat al-Kursi or `1:1` for the Fatiha opening verse.
          example: "1:1"
        sc:
          type: number
          format: float
          description: >
            Relevance score assigned by the FTS / semantic ranker (search only).
            Higher values indicate stronger relevance to the query. Absent from
            `/quran` responses.
          example: 0.87
        tr:
          type: object
          description: >
            Translations keyed by ISO 639-1 language code. Only the codes
            requested via `langs` are present. Example:
            `{ "en": { ... }, "ar": { ... } }`.
          additionalProperties:
            $ref: '#/components/schemas/TranslationContent'
        w:
          type: array
          description: >
            Word-by-word breakdown of the verse (present only when
            `include_words=true`). Each element represents one Arabic word in
            reading order.
          items:
            $ref: '#/components/schemas/WordData'

    TranslationContent:
      type: object
      description: >
        A single translation of a verse in one language. All short field names
        follow the minified key convention documented in the info section.
      properties:
        li:
          type: integer
          description: lang_id — internal integer identifier for this language.
          example: 1
        lc:
          type: string
          description: >
            lang_code — ISO 639-1 language code, e.g. `en`, `ar`, `fr`.
          example: "en"
        d:
          type: string
          enum: [ltr, rtl]
          description: >
            direction — text direction for this language. `ltr` for Latin-script
            languages (English, French, …); `rtl` for Arabic, Hebrew, Urdu, etc.
          example: "ltr"
        tx:
          type: string
          description: Full translation text of this verse in this language.
          example: "In the name of God, the Gracious, the Merciful."
        s:
          type: string
          nullable: true
          description: >
            subtitle — chapter-level subtitle or section heading associated
            with this verse (Quran-specific, nullable). Typically appears only
            on verse 1 of a chapter.
          example: null
        f:
          type: string
          nullable: true
          description: >
            footer — translator's footnote or clarification appended after the
            verse text (nullable). May contain cross-references or explanatory
            notes.
          example: null
        hl:
          type: string
          nullable: true
          description: >
            Highlighted snippet with `<b>…</b>` tags wrapping the matched terms
            (search only). Suitable for rendering search result previews. `null`
            in `/quran` responses.
          example: "In the name of <b>God</b>, the Gracious, the Merciful."

    WordData:
      type: object
      description: >
        Data for a single Arabic word within a verse. Returned only when
        `include_words=true`. Fields `r` and `m` require their respective
        `include_root` / `include_meaning` params to be `true`.
      properties:
        wi:
          type: integer
          description: >
            word_index — 0-based position of this word within its verse. The
            first word of the verse is `wi: 0`.
          example: 0
        gi:
          type: integer
          description: >
            global_index — unique 1-based index of this word across the entire
            Quran (all chapters, all verses, in reading order).
          example: 1
        tx:
          type: object
          description: >
            Word text keyed by language code (e.g. `{ "ar": "بِسْمِ" }`). Only
            codes requested via `word_langs` are present. `null` if no
            `word_langs` were requested.
          additionalProperties:
            type: string
          nullable: true
          example:
            ar: "بِسْمِ"
        hl:
          type: object
          description: >
            Highlighted word text keyed by language code, with `<b>` tags around
            the matched portion (word search only). `null` for non-search
            responses or when the word did not match.
          additionalProperties:
            type: string
          nullable: true
          example: null
        r:
          type: string
          nullable: true
          description: >
            root — Arabic root of the word (3–4 letter root form, e.g. `رحم`
            for words related to mercy). `null` unless `include_root=true`.
          example: "سمو"
        m:
          type: string
          nullable: true
          description: >
            meaning — English gloss / meaning of this specific word form
            (e.g. `"in the name of"`). `null` unless `include_meaning=true`.
          example: "in the name of"
        meta:
          type: object
          nullable: true
          description: >
            Arbitrary metadata object containing morphological tags, grammar
            notes, or other word-level annotations. Structure may vary and
            should be treated as opaque unless documented separately.
          example: null

    Language:
      type: object
      description: A language supported by the API for translations and word text.
      properties:
        id:
          type: integer
          description: Internal integer identifier. Used internally; prefer `code` for all API calls.
          example: 1
        code:
          type: string
          description: >
            ISO 639-1 language code. Use this value in `langs`, `word_langs`,
            and `lang` parameters throughout the API.
          example: "en"
        name:
          type: string
          description: Human-readable language name in English.
          example: "English"
        direction:
          type: string
          enum: [ltr, rtl]
          description: >
            Text direction for this language. `ltr` for left-to-right scripts;
            `rtl` for right-to-left scripts (Arabic, Hebrew, Urdu, Persian).
          example: "ltr"

    ChapterMetadata:
      type: array
      description: List of metadata objects for all 114 Quranic chapters.
      items:
        $ref: '#/components/schemas/Chapter'

    Chapter:
      type: object
      description: Metadata for a single Quranic chapter.
      properties:
        chapter_number:
          type: integer
          description: Chapter number, 1-based (1–114). Also known as Surah number.
          example: 1
        verse_count:
          type: integer
          description: Total number of verses in this chapter.
          example: 7
        revelation_order:
          type: integer
          description: >
            Chronological order in which the chapter was revealed (1-based).
            Distinct from the canonical chapter_number ordering.
          example: 5
        title:
          type: string
          description: >
            Chapter title in the language requested via the `lang` parameter
            (or the default language if omitted).
          example: "The Opening"

    AppendixMetadata:
      type: array
      description: List of metadata objects for all Quranic appendices.
      items:
        $ref: '#/components/schemas/Appendix'

    Appendix:
      description: Metadata for a single Quranic appendix.
      properties:
        code:
          type: integer
          description: Numeric code identifying the appendix.
          example: 1
        title:
          type: string
          description: Title of the appendix in the requested language.
          example: "God's Attributes"
        snippet:
          type: string
          description: Short introductory excerpt from the appendix body.
          example: "The Quran teaches that God is One..."

    # -----------------------------------------------------------------------
    # Bible schemas
    # -----------------------------------------------------------------------
    BibleResponse:
      type: object
      description: >
        Top-level envelope for both `/bible` (reader) and `/bible/search` (FTS)
        responses. The `info` object describes the resolved query; `books`
        contains the matching verses grouped by book and chapter.
      properties:
        info:
          $ref: '#/components/schemas/BibleResponseInfo'
        books:
          type: array
          items:
            $ref: '#/components/schemas/BibleBookData'

    BibleResponseInfo:
      type: object
      description: >
        Metadata envelope for Bible responses. Reader fields (`book`,
        `chapter_start`, `chapter_end`, `verse_start`, `verse_end`) are
        populated by `/bible`; search fields (`q`, `total`, `limit`, `offset`)
        are populated by `/bible/search`.
      properties:
        result_count:
          type: integer
          description: Number of verses returned in this response page.
          example: 12
        book:
          type: integer
          description: >
            Requested book number (reader only). 1-based: 1 = Genesis,
            40 = Matthew, 66 = Revelation.
          example: 40
        chapter_start:
          type: integer
          description: Resolved first chapter of the query range (reader only).
          example: 5
        chapter_end:
          type: integer
          description: Resolved last chapter of the query range (reader only).
          example: 5
        verse_start:
          type: integer
          description: Resolved first verse of the query range (reader only).
          example: 1
        verse_end:
          type: integer
          description: Resolved last verse of the query range (reader only).
          example: 12
        q:
          type: string
          description: The search query as submitted (search only).
          example: "blessed are the meek"
        total:
          type: integer
          description: >
            Total matching results across all pages (search only). Use with
            `limit` and `offset` for pagination.
          example: 15
        limit:
          type: integer
          description: Page size used for this response (search only).
          example: 20
        offset:
          type: integer
          description: Number of results skipped before this page (search only).
          example: 0

    BibleBook:
      type: object
      description: Summary metadata for one Bible book, as returned by `/bible/books`.
      properties:
        bn:
          type: integer
          description: >
            book_number — 1-based index: 1 = Genesis, 40 = Matthew,
            66 = Revelation. Use this value as the `book` parameter in `/bible`.
          example: 40
        bk:
          type: string
          description: book_name — full English name of the book.
          example: "Matthew"
        t:
          type: string
          description: >
            testament — `OT` for Old Testament (books 1–39), `NT` for New
            Testament (books 40–66).
          example: "NT"
        cc:
          type: integer
          description: chapter_count — total number of chapters in this book.
          example: 28
        vc:
          type: integer
          description: verse_count — total number of verses in this book.
          example: 1071

    BibleBookData:
      type: object
      description: >
        A Bible book with nested chapters returned by `/bible` and
        `/bible/search`. In reader mode all chapters/verses in the requested
        range are included. In search mode only chapters/verses that matched
        the query are included.
      properties:
        bn:
          type: integer
          description: book_number — 1-based book index (1 = Genesis … 66 = Revelation).
          example: 40
        bk:
          type: string
          description: book_name — full English name of the book.
          example: "Matthew"
        t:
          type: string
          description: >
            testament — `OT` for Old Testament (books 1–39), `NT` for New
            Testament (books 40–66).
          example: "NT"
        chapters:
          type: array
          items:
            $ref: '#/components/schemas/BibleChapterData'

    BibleChapterData:
      type: object
      description: A single Bible chapter with its matching verses.
      properties:
        cn:
          type: integer
          description: chapter_number — 1-based chapter number within the book.
          example: 5
        hits:
          type: integer
          description: >
            Number of verses in this chapter that matched the search query
            (search only). Absent from `/bible` reader responses.
          example: 4
        verses:
          type: array
          items:
            $ref: '#/components/schemas/BibleVerseData'

    BibleVerseData:
      type: object
      description: A single Bible verse with its translations and optional relevance score.
      properties:
        vn:
          type: integer
          description: verse_number — 1-based verse number within its chapter.
          example: 3
        vk:
          type: string
          description: >
            verse_key — `book_number:chapter_number:verse_number` (all 1-based),
            e.g. `40:5:3` for Matthew 5:3 or `1:1:1` for Genesis 1:1.
          example: "40:5:3"
        sc:
          type: number
          format: float
          description: >
            Relevance score assigned by the FTS ranker (search only). Higher
            values indicate stronger relevance. Absent from `/bible` responses.
          example: 0.92
        tr:
          type: object
          description: >
            Translations keyed by ISO 639-1 language code. Only the codes
            requested via `langs` are present.
          additionalProperties:
            $ref: '#/components/schemas/BibleTranslationContent'

    BibleTranslationContent:
      type: object
      description: >
        A single translation of a Bible verse in one language. Field names
        follow the same minified key convention as the Quran API.
      properties:
        li:
          type: integer
          description: lang_id — internal integer identifier for this language.
          example: 1
        lc:
          type: string
          description: lang_code — ISO 639-1 language code, e.g. `en`.
          example: "en"
        d:
          type: string
          enum: [ltr, rtl]
          description: >
            direction — text direction for this language. `ltr` for Latin
            scripts; `rtl` for Arabic / Hebrew.
          example: "ltr"
        tx:
          type: string
          description: Full translation text of this verse in this language.
          example: "Blessed are the meek, for they will inherit the earth."
        f:
          type: string
          nullable: true
          description: >
            footer — short translator's footnote or clarification appended after
            the verse text (nullable).
          example: null
        fn:
          type: array
          items:
            type: string
          nullable: true
          description: >
            Theological footnotes — array of extended commentary strings
            (nullable). Distinct from `f` (short inline footnote): `fn` entries
            are longer annotations, cross-references, or theological
            explanations associated with this verse.
          example: null
        hl:
          type: string
          nullable: true
          description: >
            Highlighted snippet with `<b>…</b>` tags wrapping matched terms
            (search only). `null` in `/bible` reader responses.
          example: "Blessed are the <b>meek</b>, for they will inherit the earth."

    # --- Music schemas ---

    MusicArtist:
      type: object
      description: A music artist in the catalogue.
      required: [id, name, image_url, display_priority]
      properties:
        id:
          type: integer
          description: Internal artist identifier. Use this as `artist_id` in albums and tracks filters.
          example: 1
        name:
          type: string
          description: Display name of the artist.
          example: "Maher Zain"
        description:
          type: string
          nullable: true
          description: Short biography or description of the artist (nullable).
          example: "Swedish-Lebanese singer and songwriter of Islamic music."
        image_url:
          type: string
          description: URL to the artist's cover / profile image.
          example: "https://cdn.wikisubmission.org/artists/maher-zain.jpg"
        display_priority:
          type: integer
          description: Sort order for display; lower values appear first.
          example: 1

    MusicCategory:
      type: object
      description: A music category (genre / theme) used to classify tracks.
      required: [id, name, display_priority]
      properties:
        id:
          type: integer
          description: Internal category identifier. Use this as `category_id` in the tracks filter.
          example: 1
        name:
          type: string
          description: Display name of the category.
          example: "Nasheed"
        description:
          type: string
          nullable: true
          description: Short description of the category (nullable).
          example: "Vocal-only Islamic devotional music."
        display_priority:
          type: integer
          description: Sort order for display; lower values appear first.
          example: 1

    MusicAlbum:
      type: object
      description: A music album in the catalogue.
      required: [id, name, artist_id, release_date]
      properties:
        id:
          type: integer
          description: Internal album identifier. Use this as `album_id` in the tracks filter.
          example: 1
        name:
          type: string
          description: Album title.
          example: "Thank You Allah"
        artist_id:
          type: integer
          description: ID of the artist this album belongs to. Matches `id` in `MusicArtist`.
          example: 1
        release_date:
          type: string
          format: date
          description: Album release date in ISO 8601 format (`YYYY-MM-DD`).
          example: "2009-01-01"
        description:
          type: string
          nullable: true
          description: Short description of the album (nullable).
          example: null

    MusicTrack:
      type: object
      description: A single music track in the catalogue.
      required: [id, name, release_date, url, artist_id, featured]
      properties:
        id:
          type: integer
          description: Internal track identifier.
          example: 1
        name:
          type: string
          description: Track title.
          example: "Thank You Allah"
        release_date:
          type: string
          format: date
          description: Track release date in ISO 8601 format (`YYYY-MM-DD`).
          example: "2009-01-01"
        url:
          type: string
          description: Direct URL to the audio file or streaming resource.
          example: "https://cdn.wikisubmission.org/music/thank-you-allah.mp3"
        artist_id:
          type: integer
          description: ID of the artist. Matches `id` in `MusicArtist`.
          example: 1
        category_id:
          type: integer
          nullable: true
          description: ID of the category (nullable). Matches `id` in `MusicCategory`.
          example: 1
        album_id:
          type: integer
          nullable: true
          description: ID of the album (nullable). Matches `id` in `MusicAlbum`.
          example: 1
        featured:
          type: boolean
          description: >
            Whether this track is hand-picked as featured. Featured tracks are
            highlighted in the UI and can be filtered with `featured=true`.
          example: false
        lyrics:
          type: string
          nullable: true
          description: Full song lyrics (nullable). May contain newlines for line breaks.
          example: null

  responses:
    Conflict:
      description: >
        The request could not be completed due to a conflict with the current
        state of the resource. Resolve the conflict and try again.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    NotFound:
      description: >
        The server cannot find the requested resource. The endpoint may be
        invalid or the resource may no longer exist.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    BadRequest:
      description: >
        The server could not understand the request due to invalid syntax.
        The client should modify the request and try again.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    InternalServerErrror:
      description: >
        The server encountered an unexpected condition that prevented it from
        fulfilling the request. Report the issue to the support team if it
        persists.
      content:
        application/json:
          schema:
            type: object
            required: [message]
            properties:
              message:
                type: string
    NotImplementedError:
      description: The requested operation is not yet implemented.
      content:
        application/json:
          schema:
            type: object
            required: [message, code]
            properties:
              message:
                type: string
                example: "This endpoint is under development."
              code:
                type: string
                example: "NOT_IMPLEMENTED"
